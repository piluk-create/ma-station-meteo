<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Météo Bluetooth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            min-height: 100vh;
        }
    </style>
</head>
<body class="p-4 font-sans">

    <div class="max-w-md mx-auto space-y-6">
        <!-- Header -->
        <header class="flex justify-between items-center bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
            <div class="flex flex-col">
                <h1 class="text-xl font-bold">Ma Station HM-10</h1>
                <span id="connectionStatus" class="text-xs text-red-400">Non connecté</span>
            </div>
            <button id="connectBtn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl transition-all font-semibold text-sm">
                Connecter
            </button>
        </header>

        <!-- Main Dashboard -->
        <div id="dashboard" class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-2xl flex flex-col items-center">
                <span class="text-slate-400 text-sm uppercase">Température</span>
                <span id="tempVal" class="text-3xl font-bold mt-2">--°C</span>
            </div>
            <div class="glass p-4 rounded-2xl flex flex-col items-center">
                <span class="text-slate-400 text-sm uppercase">Lumière</span>
                <span id="lumVal" class="text-3xl font-bold mt-2">--%</span>
            </div>
            <div class="glass p-4 rounded-2xl col-span-2 flex flex-col items-center">
                <span class="text-slate-400 text-sm uppercase">Qualité de l'Air (Gaz)</span>
                <span id="gasVal" class="text-3xl font-bold mt-2">---</span>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="glass p-4 rounded-2xl">
            <h2 class="text-sm font-semibold text-slate-400 uppercase mb-4 text-center">Historique Température</h2>
            <canvas id="tempChart" height="200"></canvas>
        </div>

        <!-- Settings Tab -->
        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                ⚙️ Réglages
            </h2>
            <div class="space-y-4">
                <label class="block text-sm text-slate-400">Intervalle de rafraîchissement (ms)</label>
                <div class="flex gap-2">
                    <input type="number" id="refreshInput" value="2000" min="500" step="500" 
                           class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                    <button id="sendIntervalBtn" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-xl transition-all font-bold">
                        Appliquer
                    </button>
                </div>
                <p class="text-xs text-slate-500 italic">L'envoi nécessite une connexion active.</p>
            </div>
        </div>

        <!-- Debug / Simulator for testing in disallowed environments -->
        <div class="text-center">
            <button id="simBtn" class="text-xs text-slate-500 underline">Simuler des données (Test Mode)</button>
        </div>

        <div id="statusLog" class="text-center text-xs text-slate-400 mt-2 bg-black/20 p-2 rounded">
            Note: Le Bluetooth Web nécessite HTTPS et une interaction utilisateur.
        </div>
    </div>

    <script>
        let bluetoothDevice;
        let characteristic;
        let tempChart;

        // Initialisation du graphique
        const ctx = document.getElementById('tempChart').getContext('2d');
        tempChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temp °C',
                    data: [],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        grid: { color: '#334155' }, 
                        ticks: { color: '#94a3b8' },
                        suggestedMin: 15,
                        suggestedMax: 35
                    }
                }
            }
        });

        const connectBtn = document.getElementById('connectBtn');
        const statusLog = document.getElementById('statusLog');
        const connStatusText = document.getElementById('connectionStatus');

        // Fonction de mise à jour de l'UI
        function updateUI(temp, lum, gas) {
            document.getElementById('tempVal').innerText = temp.toFixed(1) + "°C";
            document.getElementById('lumVal').innerText = lum + "%";
            document.getElementById('gasVal').innerText = gas;

            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            tempChart.data.labels.push(now);
            tempChart.data.datasets[0].data.push(temp);
            
            if (tempChart.data.labels.length > 15) {
                tempChart.data.labels.shift();
                tempChart.data.datasets[0].data.shift();
            }
            tempChart.update();
        }

        // Gestionnaire de données Bluetooth
        function handleData(event) {
            try {
                const value = new TextDecoder().decode(event.target.value);
                console.log("Reçu Bluetooth:", value);
                
                const parts = value.trim().split(',');
                if (parts.length >= 3) {
                    updateUI(parseFloat(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
                }
            } catch (e) {
                console.error("Erreur parsing:", e);
            }
        }

        // Connexion Bluetooth
        connectBtn.addEventListener('click', async () => {
            try {
                // Vérification du protocole
                if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                    statusLog.innerHTML = "<span class='text-red-400'>Erreur : Le Bluetooth nécessite une connexion HTTPS sécurisée.</span>";
                    return;
                }

                statusLog.innerText = "Demande d'accès au Bluetooth...";
                
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['0000ffe0-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });

                statusLog.innerText = "Connexion au serveur GATT...";
                const server = await bluetoothDevice.gatt.connect();
                
                statusLog.innerText = "Récupération du service...";
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                
                statusLog.innerText = "Récupération de la caractéristique...";
                characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleData);

                connectBtn.innerText = "Connecté ✅";
                connectBtn.classList.replace('bg-blue-600', 'bg-green-600');
                connStatusText.innerText = "Connecté à " + (bluetoothDevice.name || "HM-10");
                connStatusText.classList.replace('text-red-400', 'text-green-400');
                statusLog.innerText = "Réception de données active.";

            } catch (error) {
                console.error(error);
                statusLog.innerHTML = `<span class='text-red-400'>Erreur : ${error.message}</span><br><small>Assurez-vous d'être en HTTPS et d'avoir activé le Bluetooth.</small>`;
            }
        });

        // Envoyer l'intervalle
        document.getElementById('sendIntervalBtn').addEventListener('click', async () => {
            if (!characteristic) {
                statusLog.innerText = "Erreur : Connectez le Bluetooth d'abord !";
                return;
            }
            try {
                const val = document.getElementById('refreshInput').value;
                const data = new TextEncoder().encode(val + "\n");
                await characteristic.writeValue(data);
                statusLog.innerText = "Configuration envoyée : " + val + "ms";
            } catch (e) {
                statusLog.innerText = "Erreur d'envoi : " + e.message;
            }
        });

        // Mode Simulateur pour test local / environnement restreint
        document.getElementById('simBtn').addEventListener('click', () => {
            const fakeTemp = 20 + Math.random() * 10;
            const fakeLum = Math.floor(Math.random() * 100);
            const fakeGas = 300 + Math.floor(Math.random() * 200);
            updateUI(fakeTemp, fakeLum, fakeGas);
            statusLog.innerText = "Données simulées générées.";
        });
    </script>
</body>
</html>
